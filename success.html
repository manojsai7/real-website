<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Order Confirmed – Code Hunters</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Montserrat', 'Segoe UI', Arial, sans-serif; background: #0a0a23; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    .header { width: 100%; background: #12122e; padding: 18px 30px; text-align: center; border-bottom: 2px solid #00e676; }
    .header h1 { color: #fff; font-size: 22px; }
    .header h1 span { color: #00e676; }
    .card { max-width: 560px; margin: 60px auto; background: #15153a; border-radius: 16px; padding: 50px 40px; text-align: center; border: 1px solid #23235a; }
    .check { width: 80px; height: 80px; border-radius: 50%; background: #00e676; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
    .check svg { width: 44px; height: 44px; }
    .card h2 { font-size: 26px; color: #fff; margin-bottom: 12px; }
    .card p { font-size: 15px; color: #b0b0cc; line-height: 1.6; margin-bottom: 10px; }
    .details { margin: 24px 0; padding: 18px; background: #0d0d28; border-radius: 10px; text-align: left; }
    .details .row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px; }
    .details .row .label { color: #888; }
    .details .row .value { color: #fff; font-weight: 600; word-break: break-all; }
    .btn { display: inline-block; margin-top: 24px; padding: 14px 36px; background: linear-gradient(135deg, #6c63ff, #4834d4); color: #fff; border-radius: 10px; font-size: 16px; font-weight: 700; text-decoration: none; transition: transform 0.15s; }
    .btn:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="header">
    <h1>Code <span>Hunters</span></h1>
  </div>
  <div class="card">
    <div class="check">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0a0a23" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <h2>Payment Successful!</h2>
    <p>Thank you for your purchase. Your access details will be sent to your email shortly.</p>

    <div class="details" id="orderDetails" style="display:none;">
      <div class="row"><span class="label">Payment ID</span><span class="value" id="paymentId">–</span></div>
      <div class="row"><span class="label">Order ID</span><span class="value" id="orderId">–</span></div>
    </div>

    <p style="font-size:13px; color:#888; margin-top:16px;">
      If you don't receive an email within 5 minutes, please check your spam folder.
    </p>

    <a href="/sp/developers-kit.html" class="btn">Back to Home</a>
  </div>

<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var paymentId = params.get('payment_id');
  var orderId = params.get('order_id');
  if (paymentId || orderId) {
    document.getElementById('orderDetails').style.display = 'block';
    if (paymentId) document.getElementById('paymentId').textContent = paymentId;
    if (orderId) document.getElementById('orderId').textContent = orderId;
  }
})();
</script>
</body>
</html>
