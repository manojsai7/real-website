<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Your Cart – Code Hunters</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cardo:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; color: #1a1a1a; line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
    a { text-decoration: none; color: inherit; }
    button { font-family: inherit; cursor: pointer; }
    img { max-width: 100%; display: block; }

    :root {
      --primary: #F66711;
      --primary-dark: #CF4E01;
      --accent: #22c55e;
      --dark: #111827;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-700: #374151;
      --radius: 12px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
      --shadow-md: 0 4px 16px rgba(0,0,0,.1);
    }

    /* ===== NAVBAR ===== */
    .navbar {
      position: sticky; top: 0; z-index: 1000;
      background: rgba(255,255,255,.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--gray-200);
      padding: 0 24px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Cardo', serif; font-size: 22px; font-weight: 700; color: var(--dark);
    }
    .nav-logo span { color: var(--primary); }
    .nav-logo-icon {
      width: 36px; height: 36px; background: var(--primary); border-radius: 8px;
      display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 18px;
    }
    .nav-links { display: flex; align-items: center; gap: 28px; }
    .nav-links a { font-size: 14px; font-weight: 600; color: var(--gray-700); transition: color .2s; }
    .nav-links a:hover { color: var(--primary); }
    .nav-cart {
      position: relative; background: none; border: none; padding: 8px; color: var(--gray-700); transition: color .2s;
    }
    .nav-cart:hover { color: var(--primary); }
    .nav-cart svg { width: 24px; height: 24px; }
    .cart-badge {
      position: absolute; top: 0; right: -2px;
      background: var(--primary); color: #fff;
      font-size: 11px; font-weight: 700;
      min-width: 20px; height: 20px; border-radius: 10px;
      display: none; align-items: center; justify-content: center; padding: 0 5px;
    }

    /* ===== MAIN LAYOUT ===== */
    .cart-page { max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; flex: 1; width: 100%; }
    .cart-page h1 { font-size: 28px; font-weight: 800; color: var(--dark); margin-bottom: 8px; }
    .cart-page .subtitle { font-size: 15px; color: var(--gray-500); margin-bottom: 32px; }

    .cart-layout { display: grid; grid-template-columns: 1fr 360px; gap: 32px; align-items: start; }
    @media(max-width:860px) { .cart-layout { grid-template-columns: 1fr; } }

    /* ===== CART ITEMS ===== */
    .cart-items { background: #fff; border: 1px solid var(--gray-200); border-radius: var(--radius); overflow: hidden; }
    .cart-items-header {
      display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 40px; gap: 12px;
      padding: 14px 24px; background: var(--gray-50); border-bottom: 1px solid var(--gray-200);
      font-size: 12px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: .5px;
    }
    @media(max-width:600px) { .cart-items-header { display: none; } }

    .ci-row {
      display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 40px; gap: 12px; align-items: center;
      padding: 20px 24px; border-bottom: 1px solid var(--gray-100); transition: background .15s;
    }
    .ci-row:hover { background: var(--gray-50); }
    .ci-row:last-child { border-bottom: none; }

    @media(max-width:600px) {
      .ci-row { grid-template-columns: 1fr; gap: 8px; position: relative; padding-right: 48px; }
    }

    .ci-product { display: flex; align-items: center; gap: 14px; }
    .ci-product img {
      width: 56px; height: 56px; object-fit: cover; border-radius: 8px; background: var(--gray-100); flex-shrink: 0;
    }
    .ci-product .fallback {
      width: 56px; height: 56px; border-radius: 8px;
      background: linear-gradient(135deg, var(--primary), #ff9a56);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 800; font-size: 22px; flex-shrink: 0;
    }
    .ci-product .name { font-size: 14px; font-weight: 600; color: var(--dark); }
    .ci-price { font-size: 14px; font-weight: 600; color: var(--gray-700); }
    .ci-qty {
      display: flex; align-items: center; gap: 0;
      border: 1px solid var(--gray-200); border-radius: 8px; overflow: hidden; width: fit-content;
    }
    .ci-qty button {
      width: 34px; height: 34px; background: var(--gray-50); border: none; font-size: 16px; color: var(--dark); transition: background .15s;
    }
    .ci-qty button:hover { background: var(--gray-200); }
    .ci-qty span { width: 36px; text-align: center; font-size: 14px; font-weight: 700; }
    .ci-total { font-size: 15px; font-weight: 700; color: var(--dark); }
    .ci-remove { background: none; border: none; color: var(--gray-400); font-size: 18px; transition: color .15s; padding: 4px; }
    .ci-remove:hover { color: #d50000; }

    @media(max-width:600px) {
      .ci-remove { position: absolute; top: 20px; right: 16px; }
      .ci-price::before { content: 'Price: '; font-weight: 400; color: var(--gray-500); }
      .ci-total::before { content: 'Total: '; font-weight: 400; color: var(--gray-500); }
    }

    /* Empty state */
    .cart-empty {
      text-align: center; padding: 80px 24px;
      background: #fff; border: 1px solid var(--gray-200); border-radius: var(--radius);
    }
    .cart-empty .icon { font-size: 64px; margin-bottom: 16px; }
    .cart-empty h3 { font-size: 20px; font-weight: 700; color: var(--dark); margin-bottom: 8px; }
    .cart-empty p { font-size: 14px; color: var(--gray-500); margin-bottom: 24px; }
    .cart-empty a {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 24px; background: var(--primary); color: #fff;
      border-radius: 10px; font-weight: 700; font-size: 14px; transition: background .2s;
    }
    .cart-empty a:hover { background: var(--primary-dark); }

    /* ===== ORDER SUMMARY ===== */
    .order-summary {
      background: #fff; border: 1px solid var(--gray-200); border-radius: var(--radius);
      padding: 28px; position: sticky; top: 88px;
    }
    .order-summary h3 { font-size: 18px; font-weight: 700; color: var(--dark); margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--gray-200); }
    .os-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; }
    .os-row .label { color: var(--gray-500); }
    .os-row .value { font-weight: 600; color: var(--dark); }
    .os-divider { height: 1px; background: var(--gray-200); margin: 16px 0; }
    .os-total { display: flex; justify-content: space-between; font-size: 20px; font-weight: 800; color: var(--dark); margin-bottom: 24px; }
    .os-total .value { color: var(--accent); }
    .os-checkout {
      display: block; width: 100%; padding: 15px; border: none; border-radius: 10px;
      background: var(--primary); color: #fff; font-size: 16px; font-weight: 700;
      text-align: center; transition: background .2s, transform .15s, box-shadow .25s;
    }
    .os-checkout:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(246,103,17,.3); }
    .os-checkout:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }
    .os-continue {
      display: block; width: 100%; padding: 12px; border: 2px solid var(--gray-200); border-radius: 10px; margin-top: 10px;
      background: #fff; color: var(--gray-700); font-size: 14px; font-weight: 600; text-align: center; transition: all .2s;
    }
    .os-continue:hover { border-color: var(--primary); color: var(--primary); }
    .os-secure { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 16px; font-size: 12px; color: var(--gray-400); }

    .clear-cart-btn {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 16px; padding: 8px 16px; border: 1px solid var(--gray-200); border-radius: 8px;
      background: #fff; color: var(--gray-500); font-size: 13px; font-weight: 600; transition: all .2s;
    }
    .clear-cart-btn:hover { border-color: #d50000; color: #d50000; }

    /* ===== FOOTER ===== */
    .footer {
      background: var(--dark); color: #94a3b8; padding: 32px 24px; text-align: center;
    }
    .footer-links { display: flex; justify-content: center; gap: 24px; flex-wrap: wrap; margin-bottom: 16px; }
    .footer-links a { font-size: 14px; font-weight: 500; color: #94a3b8; transition: color .2s; }
    .footer-links a:hover { color: #fff; }
    .footer-copy { font-size: 13px; color: #475569; }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="/" class="nav-logo">
    <div class="nav-logo-icon">CH</div>
    Code <span>Hunters</span>
  </a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/#products">Products</a>
    <button class="nav-cart cart-trigger" aria-label="Cart">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      <span class="cart-badge">0</span>
    </button>
  </div>
</nav>

<!-- MAIN CONTENT -->
<main class="cart-page">
  <h1>Your Cart</h1>
  <p class="subtitle" id="cartSubtitle"></p>

  <div id="cartContent"></div>
</main>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-links">
    <a href="/">Home</a>
    <a href="/#products">Products</a>
    <a href="/checkout.html">Checkout</a>
    <a href="/terms.html">Terms & Conditions</a>
  </div>
  <p class="footer-copy">&copy; 2026 Code Hunters. All rights reserved.</p>
</footer>

<script src="/js/cart.js"></script>
<script>
(() => {
  const contentEl = document.getElementById('cartContent');
  const subtitleEl = document.getElementById('cartSubtitle');

  function render() {
    const cart = CartModule.getCart();
    const count = CartModule.getCartCount();
    const total = CartModule.getCartTotal();

    subtitleEl.textContent = count > 0 ? `${count} item${count > 1 ? 's' : ''} in your cart` : '';

    if (!cart.length) {
      contentEl.innerHTML = `
        <div class="cart-empty">
          <div class="icon">🛒</div>
          <h3>Your cart is empty</h3>
          <p>Looks like you haven't added anything yet. Browse our products and find something you love!</p>
          <a href="/">← Browse Products</a>
        </div>
      `;
      return;
    }

    contentEl.innerHTML = `
      <div class="cart-layout">
        <div>
          <div class="cart-items">
            <div class="cart-items-header">
              <span>Product</span><span>Price</span><span>Quantity</span><span>Total</span><span></span>
            </div>
            ${cart.map(item => `
              <div class="ci-row" data-id="${item.id}">
                <div class="ci-product">
                  ${item.image
                    ? `<img src="${item.image}" alt="${item.name}">`
                    : `<div class="fallback">${item.name.charAt(0)}</div>`}
                  <span class="name">${item.name}</span>
                </div>
                <span class="ci-price">₹${item.price}</span>
                <div class="ci-qty">
                  <button data-action="dec" data-id="${item.id}">−</button>
                  <span>${item.quantity}</span>
                  <button data-action="inc" data-id="${item.id}">+</button>
                </div>
                <span class="ci-total">₹${item.price * item.quantity}</span>
                <button class="ci-remove" data-action="rm" data-id="${item.id}">✕</button>
              </div>
            `).join('')}
          </div>
          <button class="clear-cart-btn" id="clearCartBtn">🗑️ Clear Cart</button>
        </div>

        <div class="order-summary">
          <h3>Order Summary</h3>
          ${cart.map(item => `
            <div class="os-row">
              <span class="label">${item.name} × ${item.quantity}</span>
              <span class="value">₹${item.price * item.quantity}</span>
            </div>
          `).join('')}
          <div class="os-divider"></div>
          <div class="os-total">
            <span>Total</span>
            <span class="value">₹${total}</span>
          </div>
          <a href="/checkout.html" class="os-checkout">Proceed to Checkout →</a>
          <a href="/" class="os-continue">← Continue Shopping</a>
          <div class="os-secure">🔒 Secure checkout via Razorpay</div>
        </div>
      </div>
    `;

    // Attach events
    contentEl.querySelectorAll('button[data-action]').forEach(btn => {
      btn.addEventListener('click', e => {
        const id = e.currentTarget.dataset.id;
        const action = e.currentTarget.dataset.action;
        const item = CartModule.getCart().find(i => i.id === id);
        if (!item) return;
        if (action === 'inc') CartModule.updateQuantity(id, item.quantity + 1);
        else if (action === 'dec') CartModule.updateQuantity(id, item.quantity - 1);
        else if (action === 'rm') CartModule.removeFromCart(id);
        render();
      });
    });

    document.getElementById('clearCartBtn').addEventListener('click', () => {
      CartModule.clearCart();
      render();
    });
  }

  // Re-render when cart changes (from drawer interaction)
  document.addEventListener('cart:changed', render);

  render();
})();
</script>

</body>
</html>
