<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Your Cart – Code Hunters</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F5F4F0; --s1: #fff; --s2: #EEEDE9;
      --b: rgba(0,0,0,.08); --b2: rgba(0,0,0,.14);
      --t1: #18181A; --t2: #706F6B; --t3: #ADADAB;
      --a: #E8440A; --ah: #CC3500; --abg: #FEF0EB;
      --g: #16A34A;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; background: var(--bg); color: var(--t1); -webkit-font-smoothing: antialiased; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; }

    /* Navbar */
    .nav { background: var(--s1); border-bottom: 1px solid var(--b); }
    .nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .nav-logo { font-size: 20px; font-weight: 800; letter-spacing: -.5px; }
    .nav-logo span { color: var(--a); }
    .nav-back { font-size: 14px; font-weight: 600; color: var(--t2); display: flex; align-items: center; gap: 6px; transition: color .15s; }
    .nav-back:hover { color: var(--t1); }
    .nav-cart-wrap { position: relative; }
    .nav-icon-btn { width: 40px; height: 40px; background: var(--s1); border: 1.5px solid var(--b); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; color: var(--t1); transition: border-color .15s; }
    .nav-icon-btn:hover { border-color: var(--b2); }
    .cart-badge { position: absolute; top: -6px; right: -6px; min-width: 18px; height: 18px; background: var(--a); color: #fff; font-size: 10px; font-weight: 800; border-radius: 9px; display: none; align-items: center; justify-content: center; padding: 0 4px; border: 2px solid var(--bg); }

    /* Layout */
    .wrap { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    .cart-layout { display: grid; grid-template-columns: 1fr 340px; gap: 32px; padding: 40px 0 64px; align-items: start; }
    @media(max-width: 900px) { .cart-layout { grid-template-columns: 1fr; gap: 24px; } }

    /* Cart header */
    .cart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .cart-title { font-size: 26px; font-weight: 800; letter-spacing: -.5px; }
    .cart-count { font-size: 15px; color: var(--t2); font-weight: 500; }
    .btn-clear { padding: 8px 14px; background: none; border: 1.5px solid var(--b2); color: var(--t2); font-size: 13px; font-weight: 600; border-radius: 7px; transition: border-color .15s, color .15s; }
    .btn-clear:hover { border-color: #d50000; color: #d50000; }

    /* Cart table */
    .cart-items { background: var(--s1); border-radius: 12px; border: 1px solid var(--b); overflow: hidden; }
    .cart-items-empty { text-align: center; padding: 56px 24px; }
    .cart-items-empty-icon { font-size: 52px; margin-bottom: 16px; }
    .cart-items-empty h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .cart-items-empty p { font-size: 15px; color: var(--t2); margin-bottom: 24px; }
    .btn-shop { display: inline-block; padding: 12px 24px; background: var(--a); color: #fff; font-size: 15px; font-weight: 700; border-radius: 8px; transition: background .15s; }
    .btn-shop:hover { background: var(--ah); }

    /* Cart row */
    .cart-row { display: flex; align-items: flex-start; gap: 16px; padding: 20px 24px; border-bottom: 1px solid var(--b); transition: background .12s; }
    .cart-row:last-child { border-bottom: none; }
    .cart-row:hover { background: #fafaf8; }
    .cart-row-icon { width: 52px; height: 52px; background: var(--abg); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
    .cart-row-info { flex: 1; min-width: 0; }
    .cart-row-title { font-size: 15px; font-weight: 700; color: var(--t1); margin-bottom: 3px; line-height: 1.3; }
    .cart-row-subtitle { font-size: 12px; color: var(--t3); margin-bottom: 10px; }
    .cart-row-ctrl { display: flex; align-items: center; gap: 10px; }
    .qty-ctrl { display: flex; align-items: center; border: 1.5px solid var(--b2); border-radius: 7px; overflow: hidden; }
    .qty-btn { background: none; border: none; width: 32px; height: 32px; font-size: 16px; cursor: pointer; color: var(--t1); display: flex; align-items: center; justify-content: center; transition: background .12s; }
    .qty-btn:hover { background: var(--s2); }
    .qty-val { font-size: 14px; font-weight: 700; min-width: 28px; text-align: center; padding: 0 2px; color: var(--t1); }
    .cart-row-rm { background: none; border: none; color: var(--t3); font-size: 14px; padding: 6px; border-radius: 6px; transition: color .12s, background .12s; cursor: pointer; }
    .cart-row-rm:hover { color: #d50000; background: #fff5f5; }
    .cart-row-price { font-size: 18px; font-weight: 800; color: var(--t1); white-space: nowrap; flex-shrink: 0; min-width: 80px; text-align: right; }
    .badge-bundle { font-size: 11px; font-weight: 700; background: var(--abg); color: var(--a); padding: 2px 8px; border-radius: 100px; }

    /* Summary sidebar */
    .summary-box { background: var(--s1); border-radius: 12px; border: 1px solid var(--b); padding: 24px; position: sticky; top: 80px; }
    .summary-title { font-size: 18px; font-weight: 800; margin-bottom: 20px; }
    .summary-row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; padding: 8px 0; border-bottom: 1px solid var(--b); }
    .summary-row:last-of-type { border-bottom: none; }
    .summary-row-label { color: var(--t2); }
    .summary-row-val { font-weight: 600; color: var(--t1); }
    .summary-total { display: flex; justify-content: space-between; align-items: baseline; font-size: 18px; font-weight: 800; padding: 16px 0 20px; border-top: 2px solid var(--t1); margin-top: 8px; }
    .summary-total-val { color: var(--a); font-size: 24px; }
    .btn-checkout { display: block; width: 100%; padding: 15px; background: var(--a); color: #fff; font-size: 16px; font-weight: 700; text-align: center; border: none; border-radius: 9px; transition: background .15s, transform .1s, box-shadow .15s; }
    .btn-checkout:hover { background: var(--ah); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(232,68,10,.25); }
    .summary-note { font-size: 12px; color: var(--t3); text-align: center; margin-top: 12px; line-height: 1.5; }
    .summary-trust { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--b); }
    .st-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--t2); font-weight: 500; }
    .st-item span:first-child { font-size: 16px; }
    .summary-savings { background: #DCFCE7; color: var(--g); font-size: 13px; font-weight: 700; padding: 10px 14px; border-radius: 8px; text-align: center; margin-bottom: 16px; }

    @media(max-width: 500px) {
      .wrap { padding: 0 16px; }
      .cart-layout { padding: 24px 0 48px; }
      .cart-row { padding: 16px; gap: 12px; }
      .cart-row-icon { width: 44px; height: 44px; font-size: 20px; }
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">Code <span>Hunters</span></a>
    <a href="/" class="nav-back">&#8592; Continue Shopping</a>
    <div class="nav-cart-wrap">
      <button class="nav-icon-btn" data-cart-open aria-label="Open cart drawer">&#128722;</button>
      <span class="cart-badge" data-cart-badge>0</span>
    </div>
  </div>
</nav>

<div class="wrap">
  <div class="cart-layout">
    <!-- Left: Cart items -->
    <div>
      <div class="cart-header">
        <div>
          <h1 class="cart-title">Shopping Cart</h1>
          <div class="cart-count" id="cartCountLabel"></div>
        </div>
        <button class="btn-clear" id="clearCartBtn">Clear cart</button>
      </div>
      <div class="cart-items" id="cartItemsBox">
        <div class="cart-items-empty">
          <div class="cart-items-empty-icon">&#128722;</div>
          <h2>Your cart is empty</h2>
          <p>Browse our products and find something you love!</p>
          <a href="/" class="btn-shop">Shop Now</a>
        </div>
      </div>
    </div>

    <!-- Right: Order Summary -->
    <div>
      <div class="summary-box">
        <div class="summary-title">Order Summary</div>
        <div id="summaryRows"></div>
        <div id="savingsRow" class="summary-savings" style="display:none"></div>
        <div class="summary-total">
          <span>Total</span>
          <span class="summary-total-val" id="summaryTotal">&#8377;0</span>
        </div>
        <a href="/checkout.html" class="btn-checkout" id="checkoutBtn">Proceed to Checkout &#8594;</a>
        <p class="summary-note">&#128274; Secured by Razorpay &#xB7; 256-bit SSL</p>
        <div class="summary-trust">
          <div class="st-item"><span>&#9889;</span><span>Instant digital delivery</span></div>
          <div class="st-item"><span>&#9854;</span><span>Lifetime access after purchase</span></div>
          <div class="st-item"><span>&#128259;</span><span>Free future updates</span></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/js/cart.js"></script>
<script>
(function() {
  var ORIG_PRICES = {
    'developers-kit': 1999,
    '30-day-data-analyst-kit': 799,
    '5-day-js-bootcamp': 599,
    'interview-mastery': 3999,
    'interview-cracking-2026': 999,
    'ats-resume-template': 499,
    'vip-pass': 499,
    'Testing-First': 99
  };

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render() {
    var cart = CartModule.getCart();
    var box = document.getElementById('cartItemsBox');
    var summaryRows = document.getElementById('summaryRows');
    var summaryTotal = document.getElementById('summaryTotal');
    var countLabel = document.getElementById('cartCountLabel');
    var savingsRow = document.getElementById('savingsRow');
    var checkoutBtn = document.getElementById('checkoutBtn');

    var totalCount = cart.reduce(function(s, i){ return s + (i.quantity || 1); }, 0);
    if (countLabel) countLabel.textContent = totalCount + ' item' + (totalCount !== 1 ? 's' : '');

    if (!cart.length) {
      box.innerHTML =
        '<div class="cart-items-empty">' +
          '<div class="cart-items-empty-icon">&#128722;</div>' +
          '<h2>Your cart is empty</h2>' +
          '<p>Browse our products and find something you love!</p>' +
          '<a href="/" class="btn-shop">Shop Now</a>' +
        '</div>';
      if (summaryRows) summaryRows.innerHTML = '';
      if (summaryTotal) summaryTotal.textContent = '&#8377;0';
      if (savingsRow) savingsRow.style.display = 'none';
      if (checkoutBtn) checkoutBtn.style.opacity = '.5';
      return;
    }

    if (checkoutBtn) checkoutBtn.style.opacity = '1';

    var html = '';
    var subtotal = 0;
    var origTotal = 0;
    cart.forEach(function(item) {
      var lineTotal = item.price * (item.quantity || 1);
      var orig = ORIG_PRICES[item.id] || item.price;
      subtotal += lineTotal;
      origTotal += orig * (item.quantity || 1);
      var isBundle = item.type === 'bundle';
      html +=
        '<div class="cart-row">' +
          '<div class="cart-row-icon">' + (isBundle ? '&#128230;' : '&#128196;') + '</div>' +
          '<div class="cart-row-info">' +
            '<div class="cart-row-title">' + esc(item.title) + '</div>' +
            '<div class="cart-row-subtitle">' +
              (isBundle ? '<span class="badge-bundle">Bundle</span>' : 'Digital product &#183; Instant delivery') +
            '</div>' +
            '<div class="cart-row-ctrl">' +
              (isBundle
                ? '<span style="font-size:12px;color:var(--t3)">Qty: 1 (bundle)</span>'
                : '<div class="qty-ctrl">' +
                    '<button class="qty-btn" data-minus data-id="' + esc(item.id) + '" aria-label="Decrease">&#8722;</button>' +
                    '<span class="qty-val">' + (item.quantity || 1) + '</span>' +
                    '<button class="qty-btn" data-plus data-id="' + esc(item.id) + '" aria-label="Increase">+</button>' +
                  '</div>'
              ) +
              '<button class="cart-row-rm" data-rm data-id="' + esc(item.id) + '" title="Remove">&#10005; Remove</button>' +
            '</div>' +
          '</div>' +
          '<div class="cart-row-price">&#8377;' + lineTotal.toLocaleString('en-IN') + '</div>' +
        '</div>';
    });
    box.innerHTML = html;

    // Summary rows
    var srHtml = '';
    cart.forEach(function(item) {
      srHtml +=
        '<div class="summary-row">' +
          '<span class="summary-row-label">' + esc(item.title) + ' &times;' + (item.quantity||1) + '</span>' +
          '<span class="summary-row-val">&#8377;' + (item.price * (item.quantity||1)).toLocaleString('en-IN') + '</span>' +
        '</div>';
    });
    if (summaryRows) summaryRows.innerHTML = srHtml;
    if (summaryTotal) summaryTotal.innerHTML = '&#8377;' + subtotal.toLocaleString('en-IN');

    var savings = origTotal - subtotal;
    if (savingsRow && savings > 0) {
      savingsRow.style.display = 'block';
      savingsRow.textContent = 'You save &#8377;' + savings.toLocaleString('en-IN') + '!';
      savingsRow.innerHTML = '&#127881; You save &#8377;' + savings.toLocaleString('en-IN') + ' on this order!';
    }

    // Wire up qty/remove buttons
    box.querySelectorAll('[data-rm]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        CartModule.removeFromCart(this.dataset.id);
      });
    });
    box.querySelectorAll('[data-minus]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var id = this.dataset.id;
        var item = CartModule.getCart().find(function(i){ return i.id === id; });
        if (item) CartModule.updateQuantity(id, (item.quantity || 1) - 1);
      });
    });
    box.querySelectorAll('[data-plus]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var id = this.dataset.id;
        var item = CartModule.getCart().find(function(i){ return i.id === id; });
        if (item) CartModule.updateQuantity(id, (item.quantity || 1) + 1);
      });
    });
  }

  document.getElementById('clearCartBtn').addEventListener('click', function() {
    if (CartModule.getCart().length && confirm('Clear your entire cart?')) {
      CartModule.clearCart();
    }
  });

  window.addEventListener('cart:changed', render);
  render();
})();
</script>
</body>
</html>
